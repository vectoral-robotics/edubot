ui:
  eyebrow: Vectoral EduBot
  title: Dashboard
  subtitle: Monitor and control your robot.
# Robot profile: which feature panels are enabled and the robot's ROS interface.
# One profile per robot — flip a feature off to hide its panel; another robot is
# just another profile (see the dashboard's ADR 001).
features:
  teleop: true
  # Viewer (3D navigation) disabled for now: code is kept in the dashboard, just
  # hidden from the sidebar and its route guarded. Flip to true to bring it back.
  navigation: false
  kinematics: true
  vibe: true
  blockly: true
  settings: true
robot:
  name: EduBot
  cmdVelTopic: /cmd_vel
  imageTopic: /image
  maxLinearSpeed: 0.45
  maxAngularSpeed: 1.9
hostActions:
  - id: reboot
    label: Reboot Host
    enabled: true
    confirm: Reboot host now?
    command: nsenter -t 1 -m -u -i -n -p -- systemctl reboot
services:
  - id: edubot
    name: ROS Core
    type: compose
    serviceName: edubot
    containerName: edubot_ros2
    autostart: true
    description: ROS 2 runtime (drivers, control, sensors)
  - id: web_video_server
    name: Web Video Server
    type: compose
    serviceName: web_video_server
    containerName: edubot_web_video_server
    url: http://{host}:8081
    autostart: false
    description: Camera stream
  - id: dev
    name: Code Server
    type: compose
    serviceName: dev
    containerName: edubot_dev
    url: https://{host}:8443
    autostart: false
    description: Browser-based VS Code
  - id: portainer
    name: Portainer
    type: compose
    serviceName: portainer
    containerName: edubot_portainer
    url: http://{host}:9000
    autostart: false
    description: Docker container management
  - id: node_red
    name: Node-RED
    type: compose
    serviceName: node_red
    containerName: edubot_node_red
    url: http://{host}:1880
    autostart: false
    description: Low-code automation flows
  # External service (opens in a new tab) — kept last, after the containers.
  - id: foxglove
    name: Foxglove
    type: link
    url: https://app.foxglove.dev/?ds=rosbridge-websocket&ds.url=ws://{host}:9090
    description: ROS2 visualization
