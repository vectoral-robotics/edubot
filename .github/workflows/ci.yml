name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Shell scripts: update.sh + the ROS 2 entrypoints. SC1091 is ignored —
      # the sourced setup.bash files only exist at container runtime.
      - name: Shellcheck
        run: shellcheck -e SC1091 scripts/*.sh docker/*.sh

      # The compose files must parse (interpolation + schema).
      - name: Validate compose (dev)
        run: docker compose -f docker-compose.dev.yaml config >/dev/null

      - name: Validate compose (fleet)
        run: EDUBOT_CHANNEL=stable docker compose -f docker-compose.yaml config >/dev/null

      # Structurally validate the vcstool manifests (no network — the dev
      # manifest points at a private repo, and this only needs to catch
      # malformed entries, not reach the remotes).
      - name: Validate repos manifests
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY'
          import yaml, sys
          ok = True
          for path in ("edubot.repos", "edubot.dev.repos"):
              data = yaml.safe_load(open(path)) or {}
              repos = data.get("repositories") or {}
              if not repos:
                  print(f"{path}: no repositories"); ok = False; continue
              for name, spec in repos.items():
                  if (spec or {}).get("type") != "git":
                      print(f"{path}:{name}: type must be git"); ok = False
                  if not (spec or {}).get("url"):
                      print(f"{path}:{name}: missing url"); ok = False
              print(f"{path}: {len(repos)} repositories OK")
          sys.exit(0 if ok else 1)
          PY

  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check commit messages
        run: >
          uvx --from commitizen@4.16.3 cz check
          --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
