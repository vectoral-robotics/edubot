name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Shell scripts: update.sh + the ROS 2 dev entrypoint.
      - name: Shellcheck
        run: shellcheck scripts/*.sh docker/*.sh

      # The compose files must parse (interpolation + schema).
      - name: Validate compose (dev)
        run: docker compose -f docker-compose.dev.yaml config >/dev/null

      - name: Validate compose (fleet)
        run: EDUBOT_CHANNEL=stable docker compose -f docker-compose.yaml config >/dev/null

      # The public vcstool manifest must be valid (dev manifest points at a
      # private repo and needs a token, so it is not network-validated in CI).
      - name: Validate repos manifest
        run: |
          pipx install vcstool
          vcs validate < edubot.repos

  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check commit messages
        run: >
          uvx --from commitizen@4.16.3 cz check
          --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
