name: release

# Builds and pushes the EduBot ROS 2 core image to GHCR.
#   push to main  -> :dev  (+ :sha-<short>)   built from edubot.repos
#   tag v*        -> :stable (+ :vX.Y.Z)      built from edubot.lock.repos
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/edubot-ros2

jobs:
  ros2-image:
    name: Build & push edubot-ros2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select manifest and compute tags
        id: plan
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            if [[ -f edubot.lock.repos ]]; then
              cp edubot.lock.repos .build.repos
            else
              echo "::warning::edubot.lock.repos missing; falling back to edubot.repos (not reproducible)"
              cp edubot.repos .build.repos
            fi
            echo "tags=${IMAGE}:stable,${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"
          else
            cp edubot.repos .build.repos
            echo "tags=${IMAGE}:dev,${IMAGE}:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "manifest_sha=$(sha256sum .build.repos | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      # QEMU enables the linux/arm64 build. Note: colcon under arm64 emulation is
      # slow — switch to a native arm64 runner + manifest merge if it gets tight.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ros2.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.plan.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            ch.vectoral.edubot.manifest-sha256=${{ steps.plan.outputs.manifest_sha }}
