# EduBot — DEVELOPER override (build everything from source, pull nothing*).
#
# Used ON TOP of docker-compose.yaml:
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d --build
# (that's what `make dev` runs). It flips the three pulled images to source
# builds using the repos that `make src` checks out:
#   - edubot (ros2)  -> built live from ./src            (docker/ros2.dev.Dockerfile)
#   - dashboard      -> built from ./dev/edubot_dashboard
#   - flasher        -> built from ./dev/edubot_firmware  (profile "flash")
# rviz / dev / web_video_server already build from this repo in the base file.
#
# * node_red and portainer are third-party tools with no source to build — they
#   are the only images still pulled, and both are optional (autostart: false).
services:
  edubot:
    build: !override
      context: ./docker
      dockerfile: ros2.dev.Dockerfile
    command: !reset null
    volumes: !override
      - ./src:/workspace/src
      - edubot_dev_build:/workspace/build
      - edubot_dev_install:/workspace/install
      - ${EDUBOT_PROJECT_DIR:-${PWD}}:/edubot
      - edubot_state:/state
      - edubot_settings:/settings
      - /dev:/dev

  dashboard:
    build:
      context: ./dev/edubot_dashboard/containers/dashboard

  flasher:
    build:
      context: ./dev/edubot_firmware
      dockerfile: containers/flasher/Dockerfile

volumes:
  edubot_dev_build:
  edubot_dev_install:
