# EduBot — DEVELOPER override (build everything from source, pull nothing*).
#
# Used ON TOP of docker-compose.yaml:
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d --build
# (that's what `make dev` runs). It flips the three pulled images to source
# builds. The build recipes all live in this repo's docker/ dir; the app sources
# are the repos that `make src` checks out into ./src and ./dev:
#   - edubot (ros2)  -> docker/ros2.dev.Dockerfile   (live from ./src)
#   - dashboard      -> docker/dashboard/Dockerfile  (source: ./dev/edubot_dashboard)
#   - flasher        -> docker/flasher/Dockerfile    (source: ./dev/edubot_firmware, profile "flash")
# dev / web_video_server already build from this repo in the base file.
#
# These use the same recipes as the pushed fleet images (scripts/release.sh); the
# only dev-specific one is the ros2 image, which mounts ./src instead of baking it.
#
# * node_red and portainer are third-party tools with no source to build — they
#   are the only images still pulled, and both are optional (autostart: false).
services:
  edubot:
    build: !override
      context: ./docker
      dockerfile: ros2.dev.Dockerfile
    command: !reset null
    volumes: !override
      - ./src:/workspace/src
      - edubot_dev_build:/workspace/build
      - edubot_dev_install:/workspace/install
      - ${EDUBOT_PROJECT_DIR:-${PWD}}:/edubot
      - edubot_state:/state
      - edubot_settings:/settings
      - /dev:/dev

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile

  flasher:
    build:
      context: .
      dockerfile: docker/flasher/Dockerfile

volumes:
  edubot_dev_build:
  edubot_dev_install:
