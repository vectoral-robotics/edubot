# EduBot — DEVELOPER stack (build from source).
#
# The ROS 2 core is built live from ./src (bind-mounted), so it always reflects
# whatever branch/commit you have checked out per repo. Use this on your laptop
# or your dev robot:  make src && make dev
#
# The surrounding services (dashboard, rviz, node_red, ...) come from the fleet
# stack (pre-built images) and are wired in once GHCR images exist (Phase 2).
# For now this file focuses on the source-built ROS 2 core — the thing you
# actually iterate on.
services:
  edubot:
    build:
      context: ./docker
      dockerfile: ros2.dev.Dockerfile
    container_name: edubot_ros2_dev
    network_mode: host
    ipc: host
    privileged: true
    restart: "no"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USE_SIM=${USE_SIM:-true}
      - USE_RVIZ=${USE_RVIZ:-false}
      - ENABLE_TELEOP=${ENABLE_TELEOP:-true}
    volumes:
      # Live source: whatever you have checked out per repo is what gets built.
      - ./src:/workspace/src
      # Persist the colcon build/install so restarts don't rebuild from scratch.
      - edubot_dev_build:/workspace/build
      - edubot_dev_install:/workspace/install
      - /dev:/dev

volumes:
  edubot_dev_build:
  edubot_dev_install:
